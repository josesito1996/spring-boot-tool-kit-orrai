# =============================================================================
# Example application.properties for a microservice that consumes the corporate
# Config Server (sami-config-server) via spring-boot-tool-kit-orrai-config-client.
#
# Copy this into your consumer's src/main/resources/application.properties and
# adjust `spring.application.name`. Everything under `starter.config.*` is the
# ONLY infra config you write — the starter injects spring.config.import,
# spring.cloud.config.*, retry, timeouts and fail-fast for you.
# =============================================================================

# --- Identity -----------------------------------------------------------------
# Must match a properties file in the Git repo (server-properties-sami), branch
# feature-dev: e.g. prediction.yml, prediction-<profile>.yml, or the shared
# application.yml. It also becomes spring.cloud.config.name by default.
spring.application.name=prediction

# --- Config Server connection -------------------------------------------------
# sami-config-server runs on port 8888 over plain HTTP (local/dev).
starter.config.uri=http://localhost:8888

# The Git repo backing the server uses the branch 'feature-dev'. The starter
# defaults the label to 'main', which does NOT exist in that repo — so override
# it here or the client will request a missing branch and fail.
starter.config.label=feature-dev

# --- Notes --------------------------------------------------------------------
# * No client credentials: sami-config-server has no HTTP security, so DO NOT set
#   starter.config.username / starter.config.password (setting only one fails by
#   design). Add them only if the server later enables basic auth.
#
# * Optional knobs (defaults shown) — uncomment to tune:
# starter.config.enabled=true          # false disables the starter entirely
# starter.config.fail-fast=true        # false => optional import, degrades if server is down (dev)
# starter.config.retry-enabled=true
# starter.config.max-attempts=6
# starter.config.initial-interval=1000
# starter.config.multiplier=1.5
# starter.config.max-interval=5000
# starter.config.connect-timeout=5000
# starter.config.read-timeout=30000
# starter.config.profile=              # defaults to the active Spring profiles
# starter.config.application-name=     # defaults to ${spring.application.name}